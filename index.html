<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🏆 Ranking de Jogadores</title>

    <link rel="stylesheet" href="estilos/style.css">

</head>


<body>


<div class="container">

    <div class="card">


        <h1>🏆 Ranking de Jogadores</h1>

        <p class="subtitulo">
            Controle de vitórias, empates, derrotas e classificação.
        </p>


        <div class="acoes">


            <input
                    type="text"
                    id="adcJogador"
                    placeholder="Digite o nome do jogador">
            <input
                    type="text"
                    id="pesquisarJogador"
                    placeholder="🔎 Pesquisar jogador"
                    onkeyup="pesquisarJogador()">


            <button class="btn" onclick="adicionarJogador()">
                ➕ Adicionar
            </button>


            <button class="btn danger" onclick="zerarPontos()">
                🔄 Zerar Pontos
            </button>


        </div>


        <div class="info">

            Total de jogadores:
            <strong id="totalJogadores">0</strong>

        </div>
        <div class="estatisticas">

            <div class="box">
                🏟️
                <span>Partidas</span>
                <strong id="totalPartidas">0</strong>
            </div>


            <div class="box">
                👑
                <span>Líder</span>
                <strong id="jogadorLider">-</strong>
            </div>


            <div class="box">
                🏆
                <span>Mais vitórias</span>
                <strong id="maisVitorias">-</strong>
            </div>


            <div class="box">
                ⭐
                <span>Maior pontuação</span>
                <strong id="maiorPontuacao">0</strong>
            </div>

        </div>



        <div class="table-container">


            <table>


                <thead>

                <tr>

                    <th>Pos.</th>
                    <th>Jogador</th>
                    <th>🏆</th>
                    <th>🤝</th>
                    <th>❌</th>
                    <th>⭐ Pontos</th>
                    <th colspan="4">Ações</th>

                </tr>

                </thead>



                <tbody id="tabelaJogadores">

                </tbody>



            </table>


        </div>



    </div>

</div>




<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

    // seu javascript aqui

</script>
<script>


    let jogadores = [

        {
            nome:"Bruno",
            vitorias:0,
            empates:0,
            derrotas:0,
            pontos:0
        }

    ];
    function salvarDados(){

        localStorage.setItem(
            "jogadores",
            JSON.stringify(jogadores)
        );

    }

    function atualizarEstatisticas(){


        let partidas = 0;


        jogadores.forEach(jogador=>{


            partidas +=
                jogador.vitorias +
                jogador.empates +
                jogador.derrotas;


        });



        partidas = partidas / 2;



        document.getElementById("totalPartidas")
            .innerHTML = partidas;



        if(jogadores.length > 0){


            let lider = jogadores[0];


            document.getElementById("jogadorLider")
                .innerHTML = lider.nome;



            let vencedor =
                jogadores.reduce((a,b)=>

                    a.vitorias > b.vitorias ? a : b

                );


            document.getElementById("maisVitorias")
                .innerHTML =
                vencedor.nome +
                " ("+
                vencedor.vitorias+
                ")";



            document.getElementById("maiorPontuacao")
                .innerHTML =
                lider.pontos;


        }


    }



    // inicia tabela
    window.onload=function(){

        atualizarTabela();

    };




    // calcula pontos
    function calculaPontos(jogador){

        return jogador.vitorias * 3 + jogador.empates;

    }





    // atualiza tabela
    function atualizarTabela(){


        jogadores.forEach(jogador=>{

            jogador.pontos = calculaPontos(jogador);

        });



        jogadores.sort((a,b)=> b.pontos - a.pontos);



        let tabela = document.getElementById("tabelaJogadores");


        tabela.innerHTML="";



        jogadores.forEach((jogador,index)=>{


            let lider = index == 0 ? "lider" : "";



            tabela.innerHTML += `


        <tr class="${lider}">


        <td>${mostrarMedalha(index)}</td>


        <td>${jogador.nome}</td>


        <td>${jogador.vitorias}</td>


        <td>${jogador.empates}</td>


        <td>${jogador.derrotas}</td>


        <td>${jogador.pontos}</td>



        <td>

        <button
        class="btn-table vitoria"
        onclick="adicionarVitoria(${index})">

        🏆 Vitória

        </button>

        </td>



        <td>

        <button
        class="btn-table empate"
        onclick="adicionarEmpate(${index})">

        🤝 Empate

        </button>

        </td>



        <td>

        <button
        class="btn-table derrota"
        onclick="adicionarDerrota(${index})">

        ❌ Derrota

        </button>

        </td>



        <td>

        <button
        class="btn-table excluir"
        onclick="removerJogador(${index})">

        🗑️

        </button>

        </td>



        </tr>


        `;


        });



        document.getElementById("totalJogadores").innerHTML =
            jogadores.length;


        salvarDados();


        atualizarEstatisticas();

    }

    function mostrarMedalha(posicao){


        if(posicao === 0){

            return "🥇";

        }


        if(posicao === 1){

            return "🥈";

        }


        if(posicao === 2){

            return "🥉";

        }


        return posicao + 1;


    }

    function pesquisarJogador(){


        let texto =
            document
                .getElementById("pesquisarJogador")
                .value
                .toLowerCase();



        let linhas =
            document
                .querySelectorAll("#tabelaJogadores tr");



        linhas.forEach(linha=>{


            let nome =
                linha
                    .children[1]
                    .textContent
                    .toLowerCase();



            if(nome.includes(texto)){


                linha.style.display="";


            }else{


                linha.style.display="none";


            }


        });


    }

    // adicionar jogador
    function adicionarJogador(){


        let campo = document.getElementById("adcJogador");


        let nome = campo.value.trim();



        if(nome==""){

            alert("Digite o nome do jogador!");

            return;

        }



        jogadores.push({

            nome:nome,

            vitorias:0,

            empates:0,

            derrotas:0,

            pontos:0

        });



        campo.value="";


        atualizarTabela();


    }





    // zerar pontos
    function zerarPontos(){


        if(confirm("Deseja realmente zerar todos os pontos?")){


            jogadores.forEach(jogador=>{


                jogador.vitorias=0;
                jogador.empates=0;
                jogador.derrotas=0;
                jogador.pontos=0;


            });


            atualizarTabela();


        }


    }




    // adicionar vitória
    function adicionarVitoria(index){


        jogadores[index].vitorias++;


        atualizarTabela();


    }





    // adicionar empate
    function adicionarEmpate(index){


        jogadores[index].empates++;


        atualizarTabela();


    }





    // adicionar derrota
    function adicionarDerrota(index){


        jogadores[index].derrotas++;


        atualizarTabela();


    }





    // excluir jogador
    function removerJogador(index){


        if(confirm("Deseja excluir este jogador?")){


            jogadores.splice(index,1);


            atualizarTabela();


        }


    }





    // tecla Enter adiciona jogador
    document
        .getElementById("adcJogador")
        .addEventListener("keypress",function(event){


            if(event.key==="Enter"){

                adicionarJogador();

            }


        });



</script>


</body>

</html>
